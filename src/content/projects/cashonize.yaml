name: Cashonize
tagline: Web-based BCH wallet built around CashTokens, WalletConnect, and CashConnect.
description: |
  Cashonize is a browser-based Bitcoin Cash wallet focused on dApp
  interaction. It supports CashTokens (fungible and NFT), WalletConnect, and
  CashConnect out of the box, with a preview screen for transaction signing
  designed to make CashScript contract execution transparent to the user.
category: wallet
website: https://cashonize.com
repository: https://github.com/cashonize/cashonize-wallet
license: MIT
freshness: active
lastVerified: '2026-07-18'
platforms:
  - web
  - browser-extension
custody: non-custodial
capabilities:
  cashtokens: true
  nfts: true
  walletConnect: true
  cashConnect: true
  testnet: true
  watchOnly: true
featured: true

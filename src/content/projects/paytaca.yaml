name: Paytaca
tagline: Non-custodial BCH wallet with CashTokens, AnyHedge, BCMR and merchant tools.
description: |
  Paytaca is a mobile-first, non-custodial Bitcoin Cash wallet available on
  Android, iOS, and as a browser extension. It supports CashTokens, NFTs,
  BCMR-authenticated token metadata, AnyHedge positions, WalletConnect, and
  P2P payments. Free to use with only standard BCH network fees.
category: wallet
website: https://www.paytaca.com
repository: https://github.com/paytaca/paytaca-app
license: MIT
freshness: active
lastVerified: '2026-07-18'
platforms:
  - android
  - ios
  - web
  - browser-extension
custody: non-custodial
capabilities:
  cashtokens: true
  nfts: true
  walletConnect: true
  merchantMode: true
  watchOnly: true
  testnet: true
featured: true

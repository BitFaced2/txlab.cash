name: Bitcoin Cash Node
tagline: Reference full-node implementation of the Bitcoin Cash protocol.
description: |
  BCHN is the most widely deployed full-node implementation on the Bitcoin
  Cash network. It implements the consensus rules through the May 2026 Layla
  upgrade (bounded loops, Pay-to-Script, OP_DEFINE/OP_INVOKE functions, and
  restored bitwise operations).
category: node
website: https://bitcoincashnode.org

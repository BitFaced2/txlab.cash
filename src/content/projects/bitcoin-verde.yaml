name: Bitcoin Verde
tagline: Java-based full-node implementation of Bitcoin Cash.
description: |
  Bitcoin Verde is a full-node implementation of the Bitcoin Cash protocol
  written from scratch in Java. Provides an alternative to BCHN's C++
  codebase, contributing to node implementation diversity — a key resilience
  property for the network.
